<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Grand Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <img src="https://images.unsplash.com/photo-1564501049412-61c2a3083791?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" class="auth-bg-img" alt="Hotel Lobby">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="fas fa-hotel fa-3x text-gold"></i>
                <h2 class="mt-2">Welcome Back</h2>
                <p class="text-muted">Sign in to your luxury account</p>
            </div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-gold w-100">Login</button>
            </form>
            <div class="mt-4 text-center">
                <span th:if="${param.error}" class="text-danger small">Invalid credentials</span>
                <span th:if="${param.logout}" class="text-success small">Logged out successfully</span>
                <span th:if="${param.registered}" class="text-success small">Account created! Please login.</span>
            </div>
            <hr class="my-4 bg-secondary">
            <p class="text-center mb-0">New to Grand Luxury? <a href="/signup" class="text-gold">Create an account</a></p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
