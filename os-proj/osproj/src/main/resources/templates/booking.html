<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings - Grand Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-hotel"></i> Grand Luxury Hotel
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rooms">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/bookings">Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" href="/scheduling">Task Scheduling</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <h1 class="mb-4">Booking Management</h1>
        
        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Bookings Table -->
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">All Bookings</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>Guest Name</th>
                                <th>Email</th>
                                <th>Room</th>
                                <th>Check-In</th>
                                <th>Check-Out</th>
                                <th>Total Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="booking : ${bookings}">
                                <td th:text="${booking.id}"></td>
                                <td th:text="${booking.guestName}"></td>
                                <td th:text="${booking.guestEmail}"></td>
                                <td th:text="${booking.room.roomNumber}"></td>
                                <td th:text="${booking.checkInDate}"></td>
                                <td th:text="${booking.checkOutDate}"></td>
                                <td th:text="'$' + ${booking.totalAmount}"></td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${booking.status == 'CONFIRMED'} ? 'bg-success' : 
                                                        (${booking.status == 'CANCELLED'} ? 'bg-danger' : 'bg-warning')"
                                          th:text="${booking.status}">
                                    </span>
                                </td>
                                <td>
                                    <a th:if="${booking.status != 'CANCELLED'}" 
                                       th:href="@{/bookings/cancel/{id}(id=${booking.id})}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Cancel this booking?')">
                                        Cancel
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
