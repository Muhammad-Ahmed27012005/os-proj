<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Rooms | Grand Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260520_133010_cb9c806d-bc9d-47f1-ac4c-b1759134ec8b.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold">✨ Our Luxurious Rooms</h1>
            <p class="lead text-muted">Experience comfort, elegance, and breathtaking views</p>
        </div>

        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-4" role="alert">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-4" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Add Room Form -->
        <div class="card border-0 shadow-lg rounded-4 mb-5">
            <div class="card-header bg-transparent border-0 pt-4">
                <h5><i class="fas fa-plus-circle text-gold me-2"></i> Add New Room</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/rooms/save}" th:object="${room}" method="post" class="form-classic">
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label">Room Number</label>
                            <input type="text" class="form-control" th:field="*{roomNumber}" placeholder="e.g., 101" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Room Type</label>
                            <select class="form-select" th:field="*{roomType}" required>
                                <option value="">Select Type</option>
                                <option value="DELUXE">Deluxe</option>
                                <option value="SUITE">Suite</option>
                                <option value="PRESIDENTIAL">Presidential</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Price per Night ($)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{pricePerNight}" placeholder="299.00" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Capacity (guests)</label>
                            <input type="number" class="form-control" th:field="*{capacity}" min="1" max="10" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Description</label>
                            <input type="text" class="form-control" th:field="*{description}" placeholder="Spacious room with ocean view...">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Amenities (comma separated)</label>
                            <input type="text" class="form-control" th:field="*{amenities}" placeholder="WiFi, AC, TV, Mini bar">
                        </div>
                    </div>
                    <div class="mt-4 text-end">
                        <button type="submit" class="btn btn-gold px-5"><i class="fas fa-save me-2"></i> Save Room</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Rooms Gallery -->
        <h3 class="mb-4"><i class="fas fa-hotel text-gold me-2"></i> Available Rooms</h3>
        <div class="row g-4">
            <div th:each="room : ${rooms}" class="col-md-6 col-lg-4">
                <div class="room-card h-100">
                    <div class="room-img" th:style="'background-image: url(\'https://picsum.photos/id/' + (${room.id} % 30 + 100) + '/400/240\');'">
                        <span class="room-badge" th:text="${room.roomType}"></span>
                    </div>
                    <div class="p-4">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="mb-0">Room <span th:text="${room.roomNumber}"></span></h5>
                            <span class="badge" th:classappend="${room.available} ? 'bg-success' : 'bg-danger'" th:text="${room.available} ? 'Available' : 'Occupied'"></span>
                        </div>
                        <p class="text-muted small" th:text="${room.description} ?: 'Experience pure comfort in this elegantly designed room.'"></p>
                        <div class="mb-2">
                            <i class="fas fa-users text-gold me-1"></i> <span th:text="${room.capacity}"></span> guests &nbsp;|&nbsp;
                            <i class="fas fa-tag text-gold me-1"></i> <span class="price fw-bold" th:text="'$' + ${room.pricePerNight} + '/night'"></span>
                        </div>
                        <p class="small" th:if="${room.amenities}"><i class="fas fa-wifi text-muted me-1"></i> <span th:text="${room.amenities}"></span></p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <a th:href="@{/rooms/delete/{id}(id=${room.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this room permanently?')">
                                <i class="fas fa-trash-alt"></i> Delete
                            </a>
                            <a th:href="@{/bookings}" class="btn btn-sm btn-outline-gold">
                                <i class="fas fa-calendar-check"></i> Book Now
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${rooms.empty}" class="col-12 text-center py-5">
                <i class="fas fa-bed fa-3x text-muted mb-3"></i>
                <p class="lead">No rooms added yet. Use the form above to add your first room.</p>
            </div>
        </div>
    </div>

    <footer class="text-white py-4 mt-5" style="background: #050608;">
        <div class="container text-center">
            <p class="mb-0 small">© 2025 Grand Luxury Hotel – Where every stay becomes a memory.</p>
            <div class="mt-2">
                <a href="#" class="text-white-50 me-3"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="text-white-50 me-3"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-white-50"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
