<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms - Grand Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-hotel"></i> Grand Luxury Hotel
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/rooms">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link" href="/bookings">Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" href="/scheduling">Task Scheduling</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <h1 class="mb-4">Our Rooms</h1>
        
        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Add Room Form -->
        <div class="card mb-4">
            <div class="card-header bg-gold text-white">
                <h5 class="mb-0">Add New Room</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/rooms/save}" th:object="${room}" method="post">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Room Number</label>
                            <input type="text" class="form-control" th:field="*{roomNumber}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Room Type</label>
                            <select class="form-select" th:field="*{roomType}" required>
                                <option value="">Select Type</option>
                                <option value="DELUXE">Deluxe</option>
                                <option value="SUITE">Suite</option>
                                <option value="PRESIDENTIAL">Presidential</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Price per Night</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{pricePerNight}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Capacity</label>
                            <input type="number" class="form-control" th:field="*{capacity}" min="1" max="10" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Description</label>
                            <input type="text" class="form-control" th:field="*{description}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Amenities</label>
                            <input type="text" class="form-control" th:field="*{amenities}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-gold">Add Room</button>
                </form>
            </div>
        </div>

        <!-- Rooms List -->
        <div class="row" id="roomsList">
            <div th:each="room : ${rooms}" class="col-md-4 mb-4">
                <div class="card room-card h-100">
                    <div class="card-header" th:classappend="${room.available} ? 'bg-success' : 'bg-danger'">
                        <span th:text="${room.available} ? 'Available' : 'Occupied'" 
                              class="badge" 
                              th:classappend="${room.available} ? 'bg-success' : 'bg-danger'">
                        </span>
                    </div>
                    <div class="card-body">
                        <h5 th:text="${room.roomType} + ' Room'"></h5>
                        <p class="text-muted" th:text="'Room ' + ${room.roomNumber}"></p>
                        <p th:text="${room.description}"></p>
                        <p><strong>Amenities:</strong> <span th:text="${room.amenities}"></span></p>
                        <p><strong>Capacity:</strong> <span th:text="${room.capacity}"></span> guests</p>
                        <h4 class="text-gold" th:text="'$' + ${room.pricePerNight} + '/night'"></h4>
                        <a th:href="@{/rooms/delete/{id}(id=${room.id})}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure?')">
                            Delete
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
