<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Grand Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <video autoplay muted loop playsinline id="bgVideo">
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260324_151826_c7218672-6e92-402c-9e45-f1e0f454bdc4.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="auth-wrapper">
        <div class="auth-card" data-aos="zoom-in">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus fa-3x text-gold"></i>
                <h2 class="mt-2">Join the Experience</h2>
                <p class="text-muted">Create your account – it's free</p>
            </div>
            <form th:action="@{/signup}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Create a strong password" required>
                </div>
                <button type="submit" class="btn btn-gold w-100">Sign Up</button>
            </form>
            <div th:if="${error}" class="mt-3 alert alert-danger small" role="alert" th:text="${error}"></div>
            <hr class="my-4 bg-secondary">
            <p class="text-center mb-0">Already a member? <a href="/login" class="text-gold">Log in</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
