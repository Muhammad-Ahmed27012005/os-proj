<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Grand Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <video autoplay muted loop playsinline id="bgVideo">
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260520_111942_8fc50f9e-4dfd-45c1-81bb-d93342a23d87.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="auth-wrapper">
        <div class="auth-card" data-aos="zoom-in">
            <div class="text-center mb-4">
                <i class="fas fa-crown fa-3x text-gold"></i>
                <h2 class="mt-2">Welcome Back</h2>
                <p class="text-muted">Sign in to your luxury account</p>
            </div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-gold w-100">Login</button>
            </form>
            <div class="mt-4 text-center">
                <span th:if="${param.error}" class="text-danger small">Invalid credentials</span>
                <span th:if="${param.logout}" class="text-success small">Logged out successfully</span>
                <span th:if="${param.registered}" class="text-success small">Account created! Please login.</span>
            </div>
            <hr class="my-4 bg-secondary">
            <p class="text-center mb-0">New to Grand Luxury? <a href="/signup" class="text-gold">Create an account</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
