<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | Grand Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Booking Banner (Fixed Image) -->
    <div class="booking-banner" style="background-image: url('https://images.unsplash.com/photo-1618773928121-c32242e63f39?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');">
        <div class="container h-100 d-flex flex-column justify-content-center">
            <h1 class="display-5 fw-bold text-white"><i class="fas fa-calendar-alt text-gold"></i> Your Bookings</h1>
            <p class="lead text-white-50">Manage reservations, check status, and explore new stays.</p>
        </div>
    </div>

    <div class="container py-5">
        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-4" role="alert">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-4" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- New Reservation Card (Classic Form) -->
        <div class="card border-0 shadow-lg rounded-4 mb-5">
            <div class="card-header bg-transparent border-0 pt-4">
                <h5><i class="fas fa-plus-circle text-gold me-2"></i> New Reservation</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/bookings/create}" th:object="${newBooking}" method="post" class="form-classic">
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label">Guest Name</label>
                            <input type="text" class="form-control" th:field="*{guestName}" placeholder="Full name" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{guestEmail}" placeholder="your@email.com" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" th:field="*{guestPhone}" placeholder="+1 234 567 8900" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Select Room</label>
                            <select class="form-select" th:field="*{room.id}" required>
                                <option value="">Choose a room</option>
                                <option th:each="r : ${availableRooms}" th:value="${r.id}" th:text="${r.roomNumber + ' - ' + r.roomType + ' ($' + r.pricePerNight + '/night)'}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Check‑in Date</label>
                            <input type="date" class="form-control" th:field="*{checkInDate}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Check‑out Date</label>
                            <input type="date" class="form-control" th:field="*{checkOutDate}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Number of Guests</label>
                            <input type="number" class="form-control" th:field="*{numberOfGuests}" min="1" placeholder="2" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Special Requests</label>
                            <textarea class="form-control" th:field="*{specialRequests}" rows="2" placeholder="Any preferences? (e.g., extra pillow, late check-in)"></textarea>
                        </div>
                    </div>
                    <div class="mt-4 text-end">
                        <button type="submit" class="btn btn-gold px-5">Confirm Booking <i class="fas fa-arrow-right ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Booking History Table -->
        <div class="card border-0 shadow rounded-4">
            <div class="card-header bg-transparent">
                <h5><i class="fas fa-history text-gold me-2"></i> Booking History</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle mb-0">
                        <thead class="border-bottom border-secondary">
                            <tr><th>ID</th><th>Guest</th><th>Room</th><th>Check‑In</th><th>Check‑Out</th><th>Total</th><th>Status</th><th></th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="booking : ${bookings}">
                                <td th:text="${booking.id}">1</td>
                                <td><strong th:text="${booking.guestName}"></strong><br><small class="text-muted" th:text="${booking.guestEmail}"></small></td>
                                <td th:text="${booking.room.roomNumber}">101</td>
                                <td th:text="${booking.checkInDate}">2025-03-01</td>
                                <td th:text="${booking.checkOutDate}">2025-03-05</td>
                                <td class="text-gold fw-bold" th:text="'$' + ${booking.totalAmount}">500</td>
                                <td><span class="badge" th:classappend="${booking.status == 'CONFIRMED'} ? 'bg-success' : (${booking.status == 'CANCELLED'} ? 'bg-danger' : 'bg-warning')" th:text="${booking.status}"></span></td>
                                <td>
                                    <a th:if="${booking.status != 'CANCELLED'}" th:href="@{/bookings/cancel/{id}(id=${booking.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Cancel this booking?')">Cancel</a>
                                </td>
                            </tr>
                            <tr th:if="${bookings.isEmpty()}">
                                <td colspan="8" class="text-center py-4 text-muted">No bookings yet. Create your first reservation above.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-white py-4 mt-5" style="background: #050608;">
        <div class="container text-center">
            <p class="mb-0 small">© 2025 Grand Luxury Hotel – Timeless elegance.</p>
            <div class="mt-2">
                <a href="#" class="text-white-50 me-3"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="text-white-50 me-3"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-white-50"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
